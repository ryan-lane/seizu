networks:
  database:
  stats:
  proxy:
  auth:
  credentials:
    driver: bridge
    ipam:
      config:
        - subnet: "169.254.169.0/24"
          gateway: "169.254.169.1"
volumes:
  authentik_postgres_data:
  authentik_media:
  neo4j_data:
  dynamodb_data:
  minio_data:
  postgres_data:
services:
  telegraf:
    image: telegraf
    volumes:
      - ./.compose/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf
    environment:
      - METRICS_PREFIX=seizu
    networks:
      stats:
  dynamodb:
    build:
      context: .compose/dynamodb
    # -sharedDb uses a single shared database file; -dbPath persists it to the
    # named volume so data survives container restarts.
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    healthcheck:
      # DynamoDB Local returns 400 for requests without proper headers, but
      # that still means the service is up and accepting connections.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      database:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fake
      MINIO_ROOT_PASSWORD: fakefake
    volumes:
      - minio_data:/data
    ports:
      - "9002:9001"
      - "9003:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      database:
  minio-create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 fake fakefake &&
      mc mb --ignore-existing local/seizu-chat-checkpoints
      "
    networks:
      database:
  # ── PostgreSQL (sqlmodel report store backend) ───────────────────────────
  # Use `make sqlmodel_enable && make down && make up` to activate this backend.
  # make up includes --profile sqlmodel automatically when REPORT_STORE_BACKEND=sqlmodel.
  postgres:
    image: postgres:18-alpine
    profiles:
      - sqlmodel
    restart: unless-stopped
    environment:
      POSTGRES_DB: seizu
      POSTGRES_USER: seizu
      POSTGRES_PASSWORD: seizu
    volumes:
      # Postgres 18+ stores cluster data under a major-version-specific
      # subdirectory below /var/lib/postgresql. Mount the parent directory so
      # the image can manage that layout.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seizu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      database:
  # ─────────────────────────────────────────────────────────────────────────
  sqs:
    image: softwaremill/elasticmq
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:9324"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./.compose/elasticmq/.elasticmq.conf:/opt/elasticmq.conf
    networks:
      database:
  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    volumes:
      - ./.compose/neo4j/neo4j.conf:/conf/neo4j.conf
      - neo4j_data:/data
      - ./.compose/neo4j/import:/import
      - ./.compose/neo4j/logs:/logs
      - ./.compose/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=none
      # Raise memory limits (Neo4j 5.x config key names)
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=1G
      # APOC plugin — set via `make apoc_enable`. Empty = disabled (default).
      - NEO4J_PLUGINS=${NEO4J_PLUGINS:-}
      # Keep local file reads disabled even if a LOAD CSV validator bypass is found.
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=false
      # APOC is optional in dev; when enabled, load only known-safe utility
      # namespaces and do not grant unrestricted procedure/function access.
      - NEO4J_dbms_security_procedures_allowlist=apoc.convert.*,apoc.text.*
      # Use a non-empty minimal value; the Neo4j Docker APOC helper replaces
      # an empty unrestricted setting with its broad apoc.* default.
      - NEO4J_dbms_security_procedures_unrestricted=apoc.convert.*,apoc.text.*
      # Defense in depth for Cypher SSRF: Seizu rejects LOAD CSV/APOC network
      # queries, and Neo4j should also block Cypher-originated HTTP/FTP access.
      - NEO4J_internal_dbms_cypher__ip__blocklist=0.0.0.0/0,::/0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      database:
  # ── Authentik identity provider ──────────────────────────────────────────
  # Use `make auth_enable && make down && make up` to start with auth.
  # make up includes --profile auth automatically when DEVELOPMENT_ONLY_REQUIRE_AUTH=true.
  # Setup is fully automated — no browser wizard required.
  #   Admin:     akadmin / devpassword  (http://localhost:9000)
  #   Dev user:  developer / devpassword
  # The seizu OIDC application is created automatically via the blueprint.
  authentik-postgresql:
    image: postgres:18-alpine
    profiles:
      - auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
    volumes:
      # Match the Postgres 18+ volume layout used by the official image.
      - authentik_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      auth:
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.3
    profiles:
      - auth
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      # Use a fixed dev secret — change this in production
      AUTHENTIK_SECRET_KEY: seizu-dev-secret-change-in-production
      # Bootstrap the initial admin account on first run
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
      AUTHENTIK_BOOTSTRAP_PASSWORD: devpassword
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # Tell Authentik what URL to advertise to browsers in OIDC discovery,
      # regardless of which Host header the request arrived under. Without
      # this, Authentik bases endpoint URLs on the request's Host — so the
      # seizu container (which discovers via http://authentik-server:9000)
      # would get back docker-internal URLs that the browser can't reach.
      # IDPs that lack an equivalent setting still work via the fallback
      # rewrite in reporting/services/oauth_client.py.
      AUTHENTIK_HOST_BROWSER: http://localhost:9000
    volumes:
      - authentik_media:/data
      - ./.config/dev/authentik/blueprints:/blueprints/custom:ro
    ports:
      - "9000:9000"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/lifecycle/ak", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Allow time for DB migrations and built-in blueprint application on first run
      start_period: 90s
    networks:
      auth:
      proxy:
  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.3
    profiles:
      - auth
    restart: unless-stopped
    command: worker
    user: root
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: seizu-dev-secret-change-in-production
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/data
      - ./.config/dev/authentik/blueprints:/blueprints/custom:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    networks:
      auth:
  seizu-scheduled-queries:
    image: ghcr.io/mappedsky/seizu
    restart: on-failure
    user: seizu
    depends_on:
      neo4j:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_DEFAULT_REGION=us-east-1
      - "SQS_CREATE_SCHEDULED_QUERY_QUEUES=true"
      - SQS_URL=http://sqs:9324
      - SCHEDULED_QUERY_MODULES=reporting.scheduled_query_modules.sqs,reporting.scheduled_query_modules.slack,reporting.scheduled_query_modules.log,reporting.scheduled_query_modules.statsd
      - SLACK_OAUTH_BOT_TOKEN
      - STATSD_HOST=telegraf
      - STATSD_CONSTANT_TAGS
      - REPORT_STORE_BACKEND
      - DYNAMODB_TABLE_NAME=seizu-reports
      - DYNAMODB_ENDPOINT_URL=http://dynamodb:8000
      - DYNAMODB_REGION=us-east-1
      - DYNAMODB_CREATE_TABLE=true
      - SQL_DATABASE_URL=postgresql://seizu:seizu@postgres:5432/seizu
    command: python -m reporting.scheduled_queries
    volumes:
      - .:/home/seizu/seizu
    networks:
      stats:
      database:
  seizu:
    image: ghcr.io/mappedsky/seizu
    build:
      context: .
      target: dev
    user: seizu
    depends_on:
      neo4j:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_NOTIFICATIONS_MIN_SEVERITY=OFF
      # JWT authentication is disabled for development by default.
      # To enable Authentik auth, start with --profile auth and change to:
      #   DEVELOPMENT_ONLY_REQUIRE_AUTH=true
      - DEVELOPMENT_ONLY_REQUIRE_AUTH
      - DEVELOPMENT_ONLY_AUTH_USER_EMAIL=testuser
      # Generic JWKS settings — works with any standard OIDC provider.
      # When using Authentik (--profile auth), point to the internal Docker hostname:
      - JWKS_URL=http://authentik-server:9000/application/o/seizu/jwks/
      - JWT_HEADER_NAME=Authorization
      - JWT_EMAIL_CLAIM=email
      - JWT_AUDIENCE=seizu
      # OIDC client config served to the frontend via GET /api/v1/config.
      # The redirect_uri must be the publicly reachable callback URL in the browser.
      - OIDC_AUTHORITY=http://localhost:9000/application/o/seizu
      # Internal authority URL for server-side OIDC discovery (differs from
      # OIDC_AUTHORITY in docker dev due to split internal/external hostnames).
      - OIDC_INTERNAL_AUTHORITY=http://authentik-server:9000/application/o/seizu
      - OIDC_CLIENT_ID=seizu
      # OIDC_REDIRECT_URI intentionally unset: the backend derives the
      # callback URL from each incoming request's Host header, so the same
      # build serves users on :3000 (vite dev proxy) and :8080 (FastAPI
      # serving the prod build) without one redirect URL clobbering the other.
      # offline_access requests a refresh_token, which the BFF uses for
      # silent renewal via direct POST to the token endpoint.
      - "OIDC_SCOPE=openid email profile offline_access"
      # Disable HTTPS redirect in development (plain HTTP)
      - "TALISMAN_FORCE_HTTPS=false"
      # Report store backend — set REPORT_STORE_BACKEND=sqlmodel to switch
      - REPORT_STORE_BACKEND
      # DynamoDB — points to the local DynamoDB container in development
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fakefake
      - AWS_DEFAULT_REGION=us-east-1
      - DYNAMODB_TABLE_NAME=seizu-reports
      - DYNAMODB_ENDPOINT_URL=http://dynamodb:8000
      - DYNAMODB_REGION=us-east-1
      - DYNAMODB_CREATE_TABLE=true
      - CHAT_CHECKPOINT_TABLE_NAME=seizu-chat-checkpoints
      - CHAT_CHECKPOINT_CREATE_TABLE=true
      - CHAT_CHECKPOINT_TTL_SECONDS=2592000
      - CHAT_CHECKPOINT_ENABLE_COMPRESSION=true
      - CHAT_CHECKPOINT_S3_BUCKET=seizu-chat-checkpoints
      - CHAT_CHECKPOINT_S3_ENDPOINT_URL=http://minio:9000
      - CHAT_CHECKPOINT_S3_KEY_PREFIX=seizu/langgraph
      # SQLModel — PostgreSQL URL for the sqlmodel backend
      - SQL_DATABASE_URL=postgresql://seizu:seizu@postgres:5432/seizu
      # MCP server — set MCP_ENABLED=false to disable the endpoint
      - MCP_ENABLED=true
      # MCP OAuth metadata — authorization/token endpoints are derived automatically
      # from OIDC_AUTHORITY via OIDC discovery. Override with MCP_OAUTH_* vars if
      # your MCP clients need a different OIDC application than the web frontend.
      # MCP_OAUTH_AUTHORIZATION_ENDPOINT=
      # MCP_OAUTH_TOKEN_ENDPOINT=
      # MCP_OAUTH_ISSUER=
      - MCP_RESOURCE_URL=http://localhost:8080/api/v1/mcp
      # In dev the project is bind-mounted here; the production image copies
      # the frontend build to /build via the Dockerfile nodebuilder stage.
      - STATIC_FOLDER=/home/seizu/seizu/build
      # Cryptographically random secret used to sign report-query capability tokens.
      - REPORT_QUERY_SIGNING_SECRET
      # AES-256-GCM key (32 bytes, base64-encoded) for the BFF session cookie.
      # Required when DEVELOPMENT_ONLY_REQUIRE_AUTH=true. Generate with:
      #   python -c 'import base64,os;print(base64.b64encode(os.urandom(32)).decode())'
      - SESSION_TOKEN_ENCRYPTION_KEY
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthcheck')"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - .:/home/seizu/seizu
    ports:
      - 8080:8080
    # Start from /run/seizu so the gunicorn arbiter control socket (gunicorn.ctl)
    # is created there instead of in the bind-mounted project volume, which
    # would cause the seizu-node watchpack watcher to trip over the Unix socket.
    command: bash -c "cd /run/seizu && exec gunicorn --config /home/seizu/seizu/gunicorn.conf reporting.asgi:application --reload --workers=2 -k uvicorn.workers.UvicornWorker --access-logfile=- --error-logfile=-"
    networks:
      proxy:
      database:
  seizu-node:
    image: oven/bun
    user: bun
    environment:
      - NODE_ENV=development
      - PORT=3000
    working_dir: /home/seizu/seizu
    volumes:
      - ~/.bun:/home/bun/.bun
      - .:/home/seizu/seizu
    ports:
      - 3000:3000
    depends_on:
      seizu:
        condition: service_healthy
    networks:
      proxy:
    command: bun run start
  cartography:
    image: ghcr.io/cartography-cncf/cartography
    user: "10001:10001"
    init: true
    # We call cartography directly, so make sure it doesn't try to start on up
    profiles:
      - nostart
    volumes:
      - ./.compose/cartography/aws-config:/srv/cartography/.aws/config
      - ./.compose/cartography/permission_relationships.yaml:/etc/cartography/permission_relationships.yaml
      - ./.compose/cartography/kube.config:/etc/cartography/kube.config
    environment:
      - "STATSD_ENABLED=true"
      - STATSD_HOST=telegraf
      - GITHUB_TOKEN=${CARTOGRAPHY_GITHUB_TOKEN}
      - NIST_NVD_TOKEN
      - CROWDSTRIKE_CLIENT_ID
      - CROWDSTRIKE_CLIENT_SECRET
      - PAGERDUTY_API_KEY
      - OKTA_API_KEY
    networks:
      credentials:
          ipv4_address: "169.254.169.2"
      stats:
      database:
