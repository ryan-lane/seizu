networks:
  database:
  stats:
  proxy:
  auth:
  credentials:
    driver: bridge
    ipam:
      config:
        - subnet: "169.254.169.0/24"
          gateway: "169.254.169.1"
volumes:
  authentik_postgres_data:
  authentik_media:
services:
  telegraf:
    image: telegraf
    volumes:
      - ./.compose/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf
    environment:
      - METRICS_PREFIX=seizu
    networks:
      stats:
  sqs:
    image: softwaremill/elasticmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9324"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./.compose/elasticmq/.elasticmq.conf:/opt/elasticmq.conf
    networks:
      database:
  neo4j:
    image: neo4j:3.5
    restart: unless-stopped
    ports:
      - 7473:7473
      - 7687:7687
    volumes:
      - ./.compose/neo4j/neo4j.conf:/conf/neo4j.conf
      - ./.compose/neo4j/data:/data
      - ./.compose/neo4j/import:/import
      - ./.compose/neo4j/logs:/logs
      - ./.compose/neo4j/plugins:/plugins
      - ./.compose/neo4j/ssl/client_policy/revoked:/ssl/client_policy/revoked
      - ./.compose/neo4j/ssl/client_policy/trusted:/ssl/client_policy/trusted
      - ~/.minica/localhost/cert.pem:/ssl/client_policy/cert.pem
      - ~/.minica/localhost/key.pem:/ssl/client_policy/key.pem
    environment:
      - NEO4J_PASSWORD
      - NEO4J_AUTH=neo4j/$NEO4J_PASSWORD
      # Raise memory limits
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms.memory.heap.initial_size=1G
      - NEO4J_dbms_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7687"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      database:
  # ── Authentik identity provider ──────────────────────────────────────────
  # Start with: docker compose --profile auth up
  # Setup is fully automated — no browser wizard required.
  #   Admin:     akadmin / devpassword  (http://localhost:9000)
  #   Dev user:  developer / devpassword
  # The seizu OIDC application is created automatically via the blueprint.
  # To enable auth in seizu, also set:
  #   DEVELOPMENT_ONLY_REQUIRE_AUTH=true   (seizu service)
  #   REACT_APP_OIDC_ENABLED=true          (seizu-node service)
  authentik-postgresql:
    image: postgres:16-alpine
    profiles:
      - auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      auth:
  authentik-redis:
    image: redis:7-alpine
    profiles:
      - auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      auth:
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.3
    profiles:
      - auth
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      # Use a fixed dev secret — change this in production
      AUTHENTIK_SECRET_KEY: seizu-dev-secret-change-in-production
      # Bootstrap the initial admin account on first run
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
      AUTHENTIK_BOOTSTRAP_PASSWORD: devpassword
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/media
      - ./.compose/authentik/blueprints:/blueprints/custom:ro
    ports:
      - "9000:9000"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/-/health/live/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Allow time for DB migrations and built-in blueprint application on first run
      start_period: 90s
    networks:
      auth:
      proxy:
  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    profiles:
      - auth
    restart: unless-stopped
    command: worker
    user: root
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: seizu-dev-secret-change-in-production
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/media
      - ./.compose/authentik/blueprints:/blueprints/custom:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      auth:
  # One-shot service: creates a developer test user via Django ORM after the
  # server is healthy. Idempotent — safe to re-run on every `docker compose up`.
  authentik-init:
    image: ghcr.io/goauthentik/server:2024.12.3
    profiles:
      - auth
    restart: on-failure
    command:
      - "shell"
      - "-c"
      - |
        from authentik.core.models import User
        obj, created = User.objects.get_or_create(
            username="developer",
            defaults={"name": "Developer", "email": "developer@localhost", "is_active": True},
        )
        if created:
            obj.set_password("devpassword")
            obj.save()
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: seizu-dev-secret-change-in-production
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    depends_on:
      authentik-server:
        condition: service_healthy
    networks:
      auth:
  # ─────────────────────────────────────────────────────────────────────────
  seizu-dashboard-stats:
    image: ghcr.io/ryan-lane/seizu
    restart: on-failure
    user: seizu
    environment:
      - NEO4J_PASSWORD
      - NEO4J_USER=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - FLASK_APP=reporting.dashboard_stats
      - STATSD_HOST=telegraf
    command: flask worker dashboard-stats
    volumes:
      - .:/home/seizu/seizu
      - ./.compose/seizu/reporting-dashboard.yaml:/reporting-dashboard.conf
    networks:
      stats:
      database:
  seizu-scheduled-queries:
    image: ghcr.io/ryan-lane/seizu
    restart: on-failure
    user: seizu
    environment:
      - NEO4J_PASSWORD
      - NEO4J_USER=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_REGION=ap-northeast-1
      - AWS_DEFAULT_REGION=ap-northeast-1
      - "SQS_CREATE_SCHEDULED_QUERY_QUEUES=true"
      - SQS_URL=http://sqs:9324
      - FLASK_APP=reporting.scheduled_queries
      - SCHEDULED_QUERY_MODULES=reporting.scheduled_query_modules.sqs,reporting.scheduled_query_modules.slack,reporting.scheduled_query_modules.log
      - SLACK_OAUTH_BOT_TOKEN
    command: flask worker schedule-queries
    volumes:
      - .:/home/seizu/seizu
      - ./.compose/seizu/reporting-dashboard.yaml:/reporting-dashboard.conf
    networks:
      stats:
      database:
  seizu:
    image: ghcr.io/ryan-lane/seizu
    build:
      context: .
      target: backend
    user: seizu
    environment:
      - HOST=0.0.0.0
      - PORT=8443
      # FORWARDED_ALLOW_IPS is needed for X-Forwarded-Proto. Gunicorn/flask will
      # not correctly identify that SSL is being used otherwise.
      - "FORWARDED_ALLOW_IPS=*"
      # Gevent will block on DNS unless ares is set.
      - GEVENT_RESOLVER=ares
      - NEO4J_PASSWORD
      - NEO4J_USER=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      # JWT authentication is disabled for development by default.
      # To enable Authentik auth, start with --profile auth and change to:
      #   DEVELOPMENT_ONLY_REQUIRE_AUTH=true
      - "DEVELOPMENT_ONLY_REQUIRE_AUTH=false"
      - DEVELOPMENT_ONLY_AUTH_USER_EMAIL=testuser
      # Generic JWKS settings — works with any standard OIDC provider.
      # When using Authentik (--profile auth), point to the internal Docker hostname:
      - JWKS_URL=http://authentik-server:9000/application/o/seizu/jwks/
      - JWT_HEADER_NAME=Authorization
      - JWT_EMAIL_CLAIM=email
      # Disable the referer check so node can proxy to the backend
      - "CSRF_CHECK_REFERER=false"
      - SECRET_KEY=fake
      - STATSD_EXTERNAL_PREFIX=seizu
      - STATSD_EXTERNAL_PROVIDER=newrelic
      - PAGERDUTY_API_KEY
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - .:/home/seizu/seizu
      - ./.compose/seizu/reporting-dashboard.yaml:/reporting-dashboard.conf
      - ~/.minica/localhost/cert.pem:/ssl/cert.pem
      - ~/.minica/localhost/key.pem:/ssl/key.pem
    ports:
      - 8443:8443
    command: gunicorn --config /home/seizu/seizu/gunicorn.conf reporting.wsgi:app --reload --workers=2 -k gevent --access-logfile=- --error-logfile=- --keyfile=/ssl/key.pem --certfile=/ssl/cert.pem
    networks:
      proxy:
      stats:
      database:
  seizu-node:
    image: oven/bun
    user: bun
    environment:
      - NODE_ENV=development
      - "HTTPS=true"
      - SSL_CRT_FILE=/ssl/cert.pem
      - SSL_KEY_FILE=/ssl/key.pem
      - PORT=7443
      # OIDC is disabled by default. To enable Authentik auth (--profile auth),
      # change REACT_APP_OIDC_ENABLED to true.
      - "REACT_APP_OIDC_ENABLED=false"
      - REACT_APP_OIDC_AUTHORITY=http://localhost:9000/application/o/seizu
      - REACT_APP_OIDC_CLIENT_ID=seizu
      - REACT_APP_OIDC_REDIRECT_URI=https://localhost:7443/auth/callback
      - "REACT_APP_OIDC_SCOPE=openid email profile"
    working_dir: /home/seizu/seizu
    volumes:
      - ~/.bun:/home/bun/.bun
      - ~/.minica/localhost/cert.pem:/ssl/cert.pem
      - ~/.minica/localhost/key.pem:/ssl/key.pem
      - .:/home/seizu/seizu
    ports:
      - 7443:7443
    networks:
      proxy:
    command: bun run start
  cartography:
    image: ghcr.io/cartography-cncf/cartography
    user: cartography
    init: true
    # We call cartography directly, so make sure it doesn't try to start on up
    profiles:
      - nostart
    volumes:
      - ./.compose/cartography/aws-config:/srv/cartography/.aws/config
      - ./.compose/cartography/permission_relationships.yaml:/etc/cartography/permission_relationships.yaml
      - ./.compose/cartography/kube.config:/etc/cartography/kube.config
    environment:
      - NEO4J_PASSWORD
      - "STATSD_ENABLED=true"
      - STATSD_HOST=telegraf
      - GITHUB_TOKEN
      - CROWDSTRIKE_CLIENT_ID
      - CROWDSTRIKE_CLIENT_SECRET
      - PAGERDUTY_API_KEY
      - OKTA_API_KEY
    networks:
      credentials:
          ipv4_address: "169.254.169.2"
      stats:
      database:
