default_language_version:
    # force all unspecified python hooks to run python3
    python: python3
    # ESLint 10 + @eslint-react require Node >= 22.13; pin so the hook does
    # not fall back to an older system Node.
    node: 24.15.0
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: check-docstring-first
    -   id: check-executables-have-shebangs
    -   id: check-merge-conflict
    -   id: check-vcs-permalinks
    -   id: check-yaml
        args: [--allow-multiple-documents]
        # Authentik blueprints use custom YAML tags (!Find, !Format, etc.)
        # that are not part of the YAML spec — exclude them from this check.
        exclude: ^\.config/dev/authentik/blueprints/
    -   id: debug-statements
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
    -   id: ruff
        args: [--fix]
    -   id: ruff-format
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.0.0
    hooks:
    -   id: mypy
        additional_dependencies:
          - pydantic
          - types-PyYAML
          - types-requests
-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.4.0
    hooks:
    -   id: eslint
        # Override the mirror's `types: [javascript]` so .ts/.tsx are linted.
        types: [file]
        exclude: ^notebooks/
        files: \.(js|jsx|ts|tsx)$
        args:
          - '--fix'
        additional_dependencies:
        -   eslint@10.4.0
        -   "@eslint/js@10.0.1"
        -   "@eslint-react/eslint-plugin@5.8.1"
        -   "@typescript-eslint/eslint-plugin@8.59.4"
        -   "@typescript-eslint/parser@8.59.4"
        -   eslint-config-prettier@10.1.8
        -   eslint-import-resolver-typescript@4.4.4
        -   eslint-plugin-import-x@4.16.2
        -   eslint-plugin-jsx-a11y@6.10.2
        -   eslint-plugin-prettier@5.5.5
        -   eslint-plugin-react-hooks@7.1.1
        -   globals@17.6.0
        -   prettier@3.8.3
        -   typescript@6.0.3
