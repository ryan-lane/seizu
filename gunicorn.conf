# -*- Python -*-
import os
from uuid import UUID

with open("/home/seizu/seizu/logging.conf", "r") as fd:
    import os.path
    import yaml

    logconfig_dict = yaml.safe_load(os.path.expandvars(fd.read()))

# Access log format:
# [time] "request" status bytes_received bytes_sent microsecond_response_time "X-Forwarded-For_header" "User-Agent_header" remote_user_header "unique_id" "Accept_header"
access_log_format = '%(t)s "%(r)s" %(s)s %({Content-Length}i)s %(b)s %(D)s "%({X-Forwarded-For}i)s" "%(a)s" %(u)s "%({X-Request-Id}i)s" "%({Accept}i)s"'

keepalive = 0
max_requests = 1000000
max_requests_jitter = 2
try:
    os.mkdir('/run/seizu')
except FileExistsError:
    pass
_host = os.environ.get('HOST', '0.0.0.0')
_port = os.environ.get('PORT', '8080')
bind = [f'{_host}:{_port}']
reload = False
# Put gunicorn healthchecks and runtime files onto tmpfs so we don't block on
# EBS-only hosts.
worker_tmp_dir = "/run/seizu"
pidfile = "/run/seizu/gunicorn.pid"
# The gunicorn.ctl arbiter control socket is created in the master process's
# CWD at startup. Set chdir to the tmpfs path so the socket never lands on
# the bind-mounted project volume (which would cause Vite's file watcher to
# trip over the Unix socket with ENXIO).
chdir = "/run/seizu"
pythonpath = "/home/seizu/seizu"
# Set the sleep time between spawning of workers to be a minimum of 1 second
spawn_worker_sleep_time = 1.0


def ssl_context(conf, default_ssl_context_factory):  # type: ignore
    return default_ssl_context_factory()


def pre_request(worker, req):  # type: ignore
    """Generate a unique X-Request-ID if the request doesn't already have one."""
    for h in req.headers:
        if 'X-REQUEST-ID' == h[0]:
            return
    req.headers.append(('X-REQUEST-ID', str(UUID(bytes=os.urandom(16), version=4))))
