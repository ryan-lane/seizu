[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "seizu-cli"
version = "0.1.0"
description = "Command-line interface for the Seizu reporting platform"
requires-python = ">=3.12"
dependencies = [
    "keyring>=24.0.0",
    "requests>=2.27.1",
    "typer[all]>=0.9.0",
]

[project.scripts]
seizu = "seizu_cli.main:app"

[tool.hatch.build.targets.wheel]
# Only ship the CLI package — the reporting/ backend is not part of the
# pip-installable distribution.
packages = ["seizu_cli"]
