[flake8]
format = pylint
exclude = .svc,CVS,.bzr,.hg,.git,__pycache__,venv
max-line-length = 120
# Ignore specific rules that conflict with Black
# E203: Whitespace before ':' (Black adds this in slices)
# W503: Line break before binary operator (Black's default behavior)
# E701: Multiple statements on one line (colon) - recommended for modern Black
extend-ignore = E203, W503, E701

[mypy]
check_untyped_defs = true
disallow_untyped_defs = true
ignore_errors = false
implicit_optional = true
plugins = pydantic.mypy

[mypy-tests.*]
ignore_errors = true

[mypy-docs.*]
ignore_errors = true

[tool:pytest]
asyncio_mode = auto

[coverage:report]
fail_under = 90
