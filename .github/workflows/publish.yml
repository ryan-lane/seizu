name: Publish release artifacts

on:
  push:
    branches:
      - master
    tags:
      - "v*"
      - "server-v*"
      - "cli-v*"
  workflow_dispatch: {}

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  publish-server-package:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/server-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/seizu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - name: Derive package version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#server-v}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build frontend
        run: |
          bun install
          bun run build
      - name: Build server package
        run: |
          uv version "${{ steps.version.outputs.version }}"
          uv build --package seizu --wheel
      - name: Publish server package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-cli-package:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/seizu-cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Derive package version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#cli-v}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build CLI package
        run: |
          uv version --project packages/seizu-cli "${{ steps.version.outputs.version }}"
          uv build --package seizu-cli --wheel
      - name: Publish CLI package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  build-and-publish-to-ghcr:
    if: github.event_name != 'push' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/server-v')
    permissions:
      contents: read
      packages: write
    name: Build and publish Docker image to GitHub Container Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=match,pattern=server-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: Dockerfile
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
