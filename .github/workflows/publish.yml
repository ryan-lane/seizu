name: Publish Docker 🐳 images 📦 to GitHub Container Registry

on:
  push:
    branches:
      - master
  release:
    types: [created]
  workflow_dispatch: {}

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  publish-cli:
    # Publish the seizu-cli pip package to PyPI on every release.
    # Requires a PyPI Trusted Publisher configured at:
    #   https://pypi.org/manage/account/publishing/
    # with publisher: GitHub Actions, repo: this repo, workflow: publish.yml
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read   # for actions/checkout
      id-token: write  # for OIDC trusted publisher (no API token needed)
    environment:
      name: pypi
      url: https://pypi.org/p/seizu-cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build CLI package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  build-and-publish-to-ghcr:
    permissions:
      contents: read   # for actions/checkout
      packages: write  # to push Docker images to GitHub Container Registry
    name: Build and publish Docker 🐳 images 📦 to GitHub Container Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          # This is the user that triggered the Workflow. In this case, it will
          # either be the user whom created the Release or manually triggered
          # the workflow_dispatch.
          username: ${{ github.actor }}
          # `secrets.GITHUB_TOKEN` is a secret that's automatically generated by
          # GitHub Actions at the start of a workflow run to identify the job.
          # This is used to authenticate against GitHub Container Registry.
          # See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#about-the-github_token-secret
          # for more detailed information.
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: Dockerfile
          context: .
          target: production
          push: true # push the image to ghcr
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
