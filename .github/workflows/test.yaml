name: Test Suite
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipenv
        uses: dschep/install-pipenv-action@v1
      - name: Run unit tests
        run: |
          make test_unit
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}
      - name: Install packages
        run: bun install
      - name: Type check
        run: bun run type-check
      - name: Run tests
        run: bun test --watchAll=false
  build-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build CLI package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: dist/
          retention-days: 7
  linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v1
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}
      - name: Install packages
        run: bun install
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
