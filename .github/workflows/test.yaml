name: Test Suite
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install pipenv
        uses: dschep/install-pipenv-action@aaac0310d5f4a052d150e5f490b44354e08fbb8c # v1
      - name: Run unit tests
        run: |
          make test_unit
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}
      - name: Install packages
        run: bun install
      - name: Type check
        run: bun run type-check
      - name: Run tests
        run: bun test --watchAll=false
  build-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build CLI package
        run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-dist
          path: dist/
          retention-days: 7
  linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # for actions/checkout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/bun.lock') }}
      - name: Install packages
        run: bun install
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
